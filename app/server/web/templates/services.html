<!doctype html>
<html lang="en" {{if .Theme}}data-theme="{{.Theme}}"{{end}}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Services</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        .tabs-nav { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:1.5rem; }
        .tab-btn {
            background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px;
            padding:0.625rem 1.25rem; font-size:0.9375rem; font-weight:500; cursor:pointer;
            color:var(--text-secondary); transition:color 0.15s, border-color 0.15s;
        }
        .tab-btn:hover { color:var(--text); }
        .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
    </style>
</head>
<body>
{{template "nav" .}}
<div class="container">
    <div class="page-header">
        <h1>Manage</h1>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" id="tab-btn-services"
            hx-get="/web/services/panel"
            hx-target="#tab-panel"
            hx-swap="innerHTML"
            onclick="setActiveTab(this)">Services</button>
        <button class="tab-btn" id="tab-btn-categories"
            hx-get="/web/categories/panel"
            hx-target="#tab-panel"
            hx-swap="innerHTML"
            onclick="setActiveTab(this)">Categories</button>
    </div>

    <div id="tab-panel">
        {{template "services-panel" .}}
    </div>
</div>

<!-- Modal backdrop -->
<div id="modal-backdrop" class="modal-backdrop" onclick="hideModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <div id="modal-content"></div>
    </div>
</div>

<!-- Confirm delete modal -->
<div id="confirm-modal" class="modal-backdrop">
    <div class="modal confirm-modal">
        <div class="modal-header">
            <h3>Confirm Delete</h3>
            <button class="modal-close" onclick="hideConfirmModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p>Are you sure you want to delete <strong id="confirm-item-name"></strong>?</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="hideConfirmModal()">Cancel</button>
            <button id="confirm-delete-btn" class="btn btn-danger"
                    hx-swap="innerHTML">Delete</button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
<script>
function setActiveTab(btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>
</body>
</html>
